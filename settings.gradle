pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://android-sdk.is.com/' }
        maven { url 'https://artifact.bytedance.com/repository/pangle/' }
    }
}

rootProject.name = "admob"
include ':libs:godot-lib'
include ':src:ads'
include ':src:core'
include ':src:mediation:adcolony'
include ':src:mediation:vungle'
include ':src:mediation:meta'
